name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.19.7 --locked

      - name: Build locked dependency graph
        run: cargo build --all-targets --all-features --locked

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Test locked dependency graph
        run: cargo test --all --locked

      - name: Test documentation
        run: cargo test --doc --locked

      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Check dependency policy
        run: cargo deny check

  installer:
    name: Install script checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck and bats
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats

      - name: Shellcheck install script
        run: shellcheck scripts/install.sh

      - name: Run install script tests
        run: bats tests/install

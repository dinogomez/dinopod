name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/dinopod" "dist/dinopod"
          tar -C dist -czf "dinopod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" dinopod
          shasum -a 256 "dinopod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" > "dinopod-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256"

      - name: Package Windows artifact
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/dinopod.exe" "dist/dinopod.exe"
          Compress-Archive -Path "dist/dinopod.exe" -DestinationPath "dinopod-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Get-FileHash "dinopod-${{ github.ref_name }}-${{ matrix.target }}.zip" -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  dinopod-${{ github.ref_name }}-${{ matrix.target }}.zip" } > "dinopod-${{ github.ref_name }}-${{ matrix.target }}.zip.sha256"

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "$GITHUB_REF_NAME" dinopod-${{ github.ref_name }}-${{ matrix.target }}.* --clobber

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish draft
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false --latest

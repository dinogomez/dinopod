name: Deploy installer

on:
  push:
    branches:
      - main
    paths:
      - scripts/install.sh
      - installer-site/**
      - .github/workflows/deploy-installer.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-installer
  cancel-in-progress: true

jobs:
  deploy:
    name: Publish install script
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare installer site
        run: |
          set -euo pipefail
          mkdir -p installer-site
          cp scripts/install.sh installer-site/install.sh
          cp scripts/install.sh installer-site/index.html
          printf '%s\n' 'install.dinopod.dev' > installer-site/CNAME
          touch installer-site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: installer-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
